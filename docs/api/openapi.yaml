openapi: 3.0.3
info:
  title: Laravel Billing Starter API
  version: 0.1.0
  description: |
    Initial API contract for the billing starter. This is a living document and
    should evolve with implementation and versioned release notes.
servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Auth
  - name: Billing Plans
  - name: Subscriptions
  - name: Payments
  - name: Invoices
  - name: Webhooks

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered. Returns user and bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          description: Validation error

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and obtain a bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated. Returns user and bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Invalid credentials

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Return authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthenticated

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current bearer token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
  /api/billing/plans:
    get:
      tags: [Billing Plans]
      summary: List available billing plans
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Plan list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'

  /api/billing/subscriptions:
    post:
      tags: [Subscriptions]
      summary: Create subscription for authenticated customer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Subscription'

  /api/billing/subscriptions/{subscriptionId}/cancel:
    post:
      tags: [Subscriptions]
      summary: Cancel an active subscription
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      responses:
        '200':
          description: Subscription canceled

  /api/billing/checkout/session:
    post:
      tags: [Payments]
      summary: Create hosted checkout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutSessionRequest'
      responses:
        '201':
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      session_id:
                        type: string
                      checkout_url:
                        type: string
                        format: uri

  /api/billing/payments:
    get:
      tags: [Payments]
      summary: List payment history for authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'

  /api/billing/invoices:
    get:
      tags: [Invoices]
      summary: List invoice history for authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Invoice list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'

  /api/billing/webhooks/{provider}:
    post:
      tags: [Webhooks]
      summary: Provider webhook ingest endpoint
      parameters:
        - $ref: '#/components/parameters/Provider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Accepted/processed (or deduplicated)
        '401':
          description: Signature verification failed
        '429':
          description: Too many requests
        '500':
          description: Retryable processing failure

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SubscriptionId:
      name: subscriptionId
      in: path
      required: true
      schema:
        type: string
    Provider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [stripe, paypal, paddle, square]

  schemas:
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 12
        password_confirmation:
          type: string
          format: password
      required: [name, email, password, password_confirmation]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required: [email, password]

    AuthTokenResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/UserProfile'
            token:
              type: string
              description: Sanctum plain-text bearer token
            token_type:
              type: string
              example: Bearer

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, customer]
      required: [id, name, email, role]

    Plan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        monthly_price:
          type: integer
        yearly_price:
          type: integer
        currency:
          type: string
      required: [id, name]

    Subscription:
      type: object
      properties:
        id:
          type: string
        plan_id:
          type: string
        status:
          type: string
          enum: [trialing, active, past_due, canceled, incomplete]
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        current_period_ends_at:
          type: string
          format: date-time
          nullable: true
      required: [id, plan_id, status]

    Payment:
      type: object
      properties:
        id:
          type: string
        amount:
          type: integer
        currency:
          type: string
        status:
          type: string
          enum: [pending, succeeded, failed, refunded]
        provider:
          type: string
      required: [id, amount, currency, status, provider]

    Invoice:
      type: object
      properties:
        id:
          type: string
        invoice_number:
          type: string
        status:
          type: string
          enum: [draft, open, paid, void, uncollectible]
        amount_due:
          type: integer
        amount_paid:
          type: integer
        currency:
          type: string
        paid_at:
          type: string
          format: date-time
          nullable: true
      required: [id, status, amount_due, currency]

    CreateSubscriptionRequest:
      type: object
      properties:
        plan_id:
          type: string
        interval:
          type: string
          enum: [monthly, yearly]
      required: [plan_id, interval]

    CreateCheckoutSessionRequest:
      type: object
      properties:
        plan_id:
          type: string
          nullable: true
        amount:
          type: integer
          nullable: true
        currency:
          type: string
          nullable: true
        success_url:
          type: string
          format: uri
        cancel_url:
          type: string
          format: uri
      required: [success_url, cancel_url]

